<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Alisha 🎂</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff9ec4,#ffd6e8);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:90%;
    max-width:400px;
    background:#fff;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h1{
    color:#ff1493;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff1493;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#e60073;
}
</style>
</head>

<body>

<div class="card">
<h1>🎉 Happy Birthday Alisha 🎂</h1>

<p>
Dear Alisha ❤️<br><br>
Wishing you a day full of happiness, laughter, and love.
May all your dreams come true and may you always stay healthy, successful, and smiling. 🌸✨
</p>

<button onclick="wish()">🎁 Open Surprise</button>
</div>

<script>
function wish(){
alert("🎂 Happy Birthday Alisha! 🥳🎉\n\nMay God bless you with happiness, success and lots of beautiful memories. Have an amazing birthday! ❤️");
}
</script>

</body>
</html>
