<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Alisha 🎂</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff5fa2,#ffc1d9);
font-family:Arial,sans-serif;
overflow:hidden;
}

.card{
background:white;
padding:30px;
border-radius:20px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:scale(0.8);
}
to{
opacity:1;
transform:scale(1);
}
}

h1{
color:#ff1493;
font-size:32px;
margin-bottom:15px;
}

p{
font-size:18px;
color:#444;
line-height:1.7;
}

.footer{
margin-top:20px;
font-size:22px;
}
</style>
</head>

<body>

<div class="card">
<h1>🎉 Happy Birthday Alisha 🎂</h1>

<p>
Dear Alisha ❤️<br><br>

Wishing you a birthday filled with happiness, laughter and beautiful memories. 🌸

May God bless you with good health, endless success and lots of joy.

Keep smiling and enjoy your special day! 🥳💖

</p>

<div class="footer">
🎂 🎈 🎁 💖 🌸
</div>

</div>

</body>
</html>
