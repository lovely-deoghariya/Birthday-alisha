<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Alisha 🎂</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ff9ec4,#ffe4f2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:20px;
    text-align:center;
    width:90%;
    max-width:450px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h1{
    color:#ff1493;
}

p{
    font-size:18px;
    color:#555;
    line-height:1.6;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff1493;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#e60073;
}
</style>
</head>

<body>

<div class="card">
    <h1>🎉 Happy Birthday Alisha! 🎂💖</h1>

    <p>
        Dear Alisha,<br><br>
        Wishing you a day filled with love, laughter, happiness, and unforgettable memories.
        May God bless you with good health, endless success, and all the joy in the world.
        Keep smiling and shining always! 🌸✨
    </p>

    <button onclick="wish()">🎁 Open Your Surprise</button>
</div>

<script>
function wish(){
    alert("🎂 Happy Birthday, Alisha! 💖 Have a wonderful day and an amazing year ahead! 🥳🎉");
}
</script>

</body>
</html>
