<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Alisha 🎂</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff5fa2,#ffb6d9);
display:flex;
justify-content:center;
align-items:center;
}

.container{
text-align:center;
color:white;
z-index:2;
}

h1{
font-size:50px;
animation:glow 2s infinite alternate;
}

h2{
margin-top:15px;
font-size:26px;
}

p{
margin-top:20px;
font-size:20px;
line-height:1.6;
}

button{
margin-top:30px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:50px;
background:white;
color:#ff1493;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

@keyframes glow{
from{
text-shadow:0 0 10px white;
}
to{
text-shadow:0 0 30px yellow,
0 0 50px white;
}
}

.balloon{
position:absolute;
bottom:-150px;
width:50px;
height:70px;
border-radius:50%;
animation:float 10s linear infinite;
}

.balloon::after{
content:"";
position:absolute;
width:2px;
height:60px;
background:white;
left:50%;
top:70px;
}

.red{background:red;left:10%;}
.blue{background:deepskyblue;left:30%;}
.green{background:limegreen;left:50%;}
.yellow{background:gold;left:70%;}
.pink{background:hotpink;left:90%;}

@keyframes float{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-120vh);
}
}
