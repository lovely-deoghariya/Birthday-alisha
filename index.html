<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Alisha 🎂</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff66b2,#ffb6c1);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{
background:white;
padding:30px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.3);
animation:zoom 1s;
}

@keyframes zoom{
from{transform:scale(.5);opacity:0;}
to{transform:scale(1);opacity:1;}
}

h1{
color:#ff1493;
}

button{
padding:12px 25px;
background:#ff1493;
color:white;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#e60073;
}
</style>
</head>

<body>

<div class="card">
<h1>🎉 Happy Birthday Alisha 🎂</h1>

<p>
Dear Alisha ❤️<br><br>
May your birthday be filled with happiness, love, laughter and unforgettable memories.
May all your dreams come true. Stay blessed and keep smiling always! 🌸✨
</p>

<button onclick="showSurprise()">🎁 Open Surprise</button>
</div>

<script>
function showSurprise(){
document.body.innerHTML=`
<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#ff69b4;color:white;text-align:center;font-family:Arial;">
<div>
<h1>🎉 Surprise! 🎉</h1>
<h2>Happy Birthday Alisha 🎂💖</h2>
<p>Wishing you lots of happiness, success and endless smiles.<br>Have an amazing year ahead! 🥳🎈</p>
<h1>🎂🎁🎉❤️</h1>
</div>
</div>
`;
}
</script>

</body>
</html>
